<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="AccurateClock provides high-precision time synchronization with millisecond accuracy, global timezone support, and a sleek analog-digital interface.">
  <link rel="canonical" href="https://accurateclock.pages.dev/">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cstyle%3Ecircle %7B fill: none; stroke: currentColor; stroke-width: 2; %7D path %7B fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; %7D %40media (prefers-color-scheme: dark) %7B svg %7B color: %23F4F4F4; %7D %7D %40media (prefers-color-scheme: light) %7B svg %7B color: %23121212; %7D %7D%3C/style%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3Cpath d='M12 6v6l4 2'/%3E%3C/svg%3E">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccurateClock | An amazing clock</title>
  
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "AccurateClock",
    "url": "https://accurateclock.pages.dev/",
    "applicationCategory": "UtilityApplication",
    "operatingSystem": "All"
  }
  </script>

  <style>
    :root {
      --bg: #F4F4F4;
      --text: #121212;
      --muted: #666;
      --border: rgba(0,0,0,0.08);
    }
    body.dark {
      --bg: #121212;
      --text: #F4F4F4;
      --muted: #999;
      --border: rgba(255,255,255,0.08);
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      transition: background 0.3s ease;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      z-index: 10;
    }
    .wrapper {
      display: flex;
      align-items: center;
      gap: 40px;
      padding: 20px;
      flex: 1;
    }
    .clock-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .date-row {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 300;
      color: var(--muted);
    }
    .time-row {
      font-size: clamp(32px, 6vw, 80px);
      font-weight: 200;
      font-family: monospace;
      font-variant-numeric: tabular-nums;
    }
    .subnano {
      font-size: 0.4em;
      opacity: 0.6;
    }
    canvas {
      width: 220px;
      height: 220px;
    }
    #tzMenu {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70%;
      background: var(--bg);
      border-top: 1px solid var(--border);
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 100;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    #tzMenu.open {
      transform: translateY(0);
    }
    #tzSearch {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      font-size: 16px;
    }
    #tzList {
      flex: 1;
      overflow-y: auto;
    }
    .tz-link {
      position: fixed;
      bottom: 10px;
      right: 10px;
      text-decoration: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      opacity: 0.5;
    }
    .tz-option {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .tz-option:hover {
      background: var(--border);
    }
    /* Accessible and clean visually hidden style for H1 SEO robot tracking */
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
    @media (max-width: 768px) {
      .wrapper {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
<button class="theme-toggle" id="themeToggle">☾</button>
<main class="wrapper">
  <h1 class="visually-hidden">AccurateClock - High Precision Online Atomic Clock</h1>
  
  <div class="clock-block">
    <div id="dateRow" class="date-row">---- -- --</div>
    <div id="timeRow" class="time-row">
      --:--:--.---
      <span class="subnano">000000</span>
    </div>
    <div id="tzDisplay" style="font-size: 12px; color: var(--muted);">Local Time</div>
  </div>
  <canvas id="analogClock" width="440" height="440" style="width:220px; height:220px;"></canvas>
</main>
<div id="tzMenu">
  <input type="text" id="tzSearch" placeholder="Search GMT offset (e.g. GMT+5)...">
  <div id="tzList"></div>
  <button onclick="toggleMenu()" style="width:100%; padding:15px; margin-top:10px; cursor:pointer;">Close</button>
</div>
<a class="tz-link" href="#tzMenu" id="tzToggleLink">🕒</a>
<script>
const canvas = document.getElementById("analogClock");
const ctx = canvas.getContext("2d");
let bc = new BroadcastChannel('clock_sync');
const tzToggleLink = document.getElementById('tzToggleLink');
let selectedTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
let wakeLock = null;

// anchorServerTime = "what the server said 'now' was"
// anchorPerfTime   = "what performance.now() was when we heard that"
let anchorServerTime = Date.now();
let anchorPerfTime = performance.now();

async function syncTime() {
  try {
    const t0 = performance.now();
    const r = await fetch("https://accurateclock.live-by-unix.workers.dev/", {
      cache: "no-store"
    });
    const t1 = performance.now();
    const d = await r.json();

    // Prefer server-reported latency if present, else fall back to RTT/2
    const rtt = t1 - t0;
    const oneWayLatency = (d.latency_ms && d.latency_ms >= 0)
      ? d.latency_ms / 2
      : rtt / 2;

    // epoch_ms is the canonical server time
    anchorServerTime = d.epoch_ms + oneWayLatency;
    anchorPerfTime = t1;

    if (bc) {
      bc.postMessage({
        type: 'offset_share',
        anchorServerTime,
        anchorPerfTime
      });
    }
  } catch (e) {
    // stay silent on failure; we keep using last good anchor
  }
}

function setupBC() {
  bc.onmessage = (e) => {
    if (e.data.type === 'offset_share') {
      anchorServerTime = e.data.anchorServerTime;
      anchorPerfTime = e.data.anchorPerfTime;
    }
  };
}
setupBC();

window.addEventListener('pagehide', () => {
  if (bc) { bc.close(); bc = null; }
});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    if (!bc) { bc = new BroadcastChannel('clock_sync'); setupBC(); }
    syncTime();
    requestWakeLock();
  }
});

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch (err) {}
}

function toggleMenu(e) {
  if (e) e.preventDefault();
  document.getElementById('tzMenu').classList.toggle('open');
}
tzToggleLink.addEventListener('click', toggleMenu);

const timezoneLocations = {"-12": "Baker Island", "-11": "American Samoa", "-10": "Hawaii", "-9": "Alaska", "-8": "Los Angeles", "-7": "Denver", "-6": "Chicago", "-5": "New York", "-4": "Santiago", "-3": "Buenos Aires", "-2": "South Georgia", "-1": "Azores", "0": "London", "1": "Berlin", "2": "Cairo", "3": "Moscow", "4": "Dubai", "5": "Karachi", "6": "Dhaka", "7": "Bangkok", "8": "Singapore", "9": "Tokyo", "10": "Sydney", "11": "Noumea", "12": "Auckland", "13": "Samoa", "14": "Kiritimati"};
const allTimezones = [];
for (let i = -12; i <= 14; i++) {
  const sign = i >= 0 ? "+" : "-";
  const val = Math.abs(i);
  const name = `Etc/GMT${i >= 0 ? "-" : "+"}${val}`;
  const location = timezoneLocations[String(i)] || "Unknown";
  allTimezones.push({ name, offset: i, display: `GMT${sign}${val} / ${location}` });
}

const tzList = document.getElementById('tzList');
const tzSearch = document.getElementById('tzSearch');

function renderTzList(filter = "") {
  tzList.innerHTML = "";
  const fragment = document.createDocumentFragment();
  allTimezones
    .filter(tz => tz.display.toLowerCase().includes(filter.toLowerCase()))
    .forEach(tz => {
      const div = document.createElement('div');
      div.className = 'tz-option';
      div.textContent = tz.display;
      div.onclick = () => {
        selectedTz = tz.name;
        document.getElementById('tzDisplay').textContent = tz.display;
        toggleMenu();
      };
      fragment.appendChild(div);
    });
  tzList.appendChild(fragment);
}
tzSearch.addEventListener('input', (e) => renderTzList(e.target.value));
renderTzList();

function clockLoop() {
  const nowPerf = performance.now();
  const msPassedSinceSync = nowPerf - anchorPerfTime;
  const targetTimeMs = anchorServerTime + msPassedSinceSync;

  const tzTime = new Date(targetTimeMs);

  const formatter = new Intl.DateTimeFormat('en-US', {
    timeZone: selectedTz,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  });

  const parts = formatter.formatToParts(tzTime);
  const p = {};
  parts.forEach(part => p[part.type] = part.value);

  const ms = String(tzTime.getMilliseconds()).padStart(3, '0');
  const micro = String(Math.floor((msPassedSinceSync % 1) * 1000000)).padStart(6, '0');

  document.getElementById('dateRow').textContent = `${p.year}-${p.month}-${p.day}`;
  document.getElementById('timeRow').innerHTML =
    `${p.hour}:${p.minute}:${p.second}.${ms} <span class="subnano">${micro}</span>`;

  drawAnalog(Number(p.hour), Number(p.minute), Number(p.second), tzTime.getMilliseconds());
  requestAnimationFrame(clockLoop);
}

function drawAnalog(h, m, s, msValue) {
  ctx.clearRect(0, 0, 440, 440);
  ctx.save();
  ctx.translate(220, 220);
  const fg = getComputedStyle(document.body).getPropertyValue("--text").trim();
  ctx.strokeStyle = fg;

  for (let i = 0; i < 12; i++) {
    ctx.beginPath();
    ctx.moveTo(0, -190);
    ctx.lineTo(0, -210);
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.rotate(Math.PI / 6);
  }

  const exactS = s + msValue / 1000;
  const exactM = m + exactS / 60;
  const exactH = (h % 12) + exactM / 60;

  const drawHand = (angle, len, width, color) => {
    ctx.save();
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, 10);
    ctx.lineTo(0, -len);
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = "round";
    ctx.stroke();
    ctx.restore();
  };

  drawHand(exactH * Math.PI / 6, 120, 10, fg);
  drawHand(exactM * Math.PI / 30, 170, 6, fg);
  drawHand(exactS * Math.PI / 30, 190, 3, "#E74C3C");
  ctx.restore();
}

const toggle = document.getElementById("themeToggle");
toggle.onclick = () => {
  document.body.classList.toggle("dark");
  toggle.textContent = document.body.classList.contains("dark") ? "☀" : "☾";
};

syncTime();
requestWakeLock();
requestAnimationFrame(clockLoop);
</script>
</body>
</html>

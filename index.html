<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="A minimalist, ad-free atomic clock with nanosecond precision. Auto-adjusts to local time using edge computing.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AccurateClock|The better clock </title>

  <style>
    :root {
      --bg: #F4F4F4;
      --text: #121212;
      --muted: #666;
      --accent: #121212;
      --border: rgba(0,0,0,0.08);
    }

    body.dark {
      --bg: #121212;
      --text: #F4F4F4;
      --muted: #999;
      --accent: #F4F4F4;
      --border: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family:
        Inter,
        Helvetica Neue,
        Helvetica,
        Arial,
        sans-serif;
      transition:
        background 0.3s ease,
        color 0.3s ease;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      transition:
        background 0.2s ease,
        transform 0.2s ease;
    }

    .theme-toggle:hover {
      transform: scale(1.05);
    }

    .wrapper {
      display: flex;
      align-items: center;
      gap: 64px;
      padding: 40px;
    }

    .clock-block {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .date-row {
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .time-row {
      font-size: clamp(42px, 7vw, 96px);
      font-weight: 200;
      line-height: 1;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      font-family:
        SFMono-Regular,
        ui-monospace,
        Menlo,
        Monaco,
        Consolas,
        monospace;
      white-space: nowrap;
    }

    .subnano {
      font-size: 0.4em;
      opacity: 0.75;
    }

    canvas {
      width: 240px;
      height: 240px;
    }

    @media (max-width: 900px) {
      .wrapper {
        flex-direction: column;
        gap: 40px;
      }

      canvas {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle">☾</button>

  <div class="wrapper">
    <div class="clock-block">
      <div class="date-row" id="dateRow">
        ---- -- --
      </div>

      <div class="time-row" id="timeRow">
        --:--:--.--- <span class="subnano">000000</span>
      </div>
    </div>

    <canvas id="analogClock" width="240" height="240"></canvas>
  </div>

  <script>
    // ============================================
    // CONFIG
    // ============================================

    
    const WORKER_URL = "https://accurateclock.live-by-unix.workers.dev/";

    // ============================================
    // FAVICON
    // ============================================

    (() => {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64">
          <rect width="100%" height="100%" rx="14" fill="#121212"/>
          <circle cx="32" cy="32" r="22" fill="none" stroke="#F4F4F4" stroke-width="3"/>
          <line x1="32" y1="32" x2="32" y2="18" stroke="#F4F4F4" stroke-width="3" stroke-linecap="round"/>
          <line x1="32" y1="32" x2="42" y2="36" stroke="#F4F4F4" stroke-width="3" stroke-linecap="round"/>
        </svg>
      `;

      const favicon = document.createElement("link");
      favicon.rel = "icon";
      favicon.href =
        "data:image/svg+xml;charset=UTF-8," +
        encodeURIComponent(svg);

      document.head.appendChild(favicon);
    })();

    // ============================================
    // THEME
    // ============================================

    const toggle = document.getElementById("themeToggle");

    function applyTheme(theme) {
      document.body.classList.toggle("dark", theme === "dark");
      toggle.textContent = theme === "dark" ? "☀" : "☾";
      localStorage.setItem("accurateclock-theme", theme);
    }

    const savedTheme =
      localStorage.getItem("accurateclock-theme") ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light");

    applyTheme(savedTheme);

    toggle.addEventListener("click", () => {
      const next =
        document.body.classList.contains("dark")
          ? "light"
          : "dark";

      applyTheme(next);
    });

    // ============================================
    // CLOCK SYNC
    // ============================================

    const dateRow = document.getElementById("dateRow");
    const timeRow = document.getElementById("timeRow");

    let baseEpoch = Date.now();
    let basePerf = performance.now();

    async function syncClock() {
      try {
        const t0 = performance.now();

        const response = await fetch(
          `${WORKER_URL}?_=${Date.now()}`,
          {
            cache: "no-store"
          }
        );

        const data = await response.json();

        const t1 = performance.now();

        const rtt = t1 - t0;
        const latency = rtt / 2;

        // server epoch corrected by half RTT
        baseEpoch = data.epoch + latency;
        basePerf = t1;

        console.log(
          `Synced | RTT: ${rtt.toFixed(2)}ms | latency: ${latency.toFixed(2)}ms`
        );
      } catch (err) {
        console.error("Clock sync failed:", err);
      }
    }

    syncClock();

    // periodic resync
    setInterval(syncClock, 15000);

    // ============================================
    // ANALOG CLOCK
    // ============================================

    const canvas = document.getElementById("analogClock");
    const ctx = canvas.getContext("2d");

    function drawAnalog(now) {
      const w = canvas.width;
      const h = canvas.height;
      const r = w / 2;

      ctx.clearRect(0, 0, w, h);

      ctx.save();
      ctx.translate(r, r);

      const styles = getComputedStyle(document.body);

      const fg = styles.getPropertyValue("--text").trim();
      const border = styles.getPropertyValue("--border").trim();

      // outer ring
      ctx.beginPath();
      ctx.arc(0, 0, r - 4, 0, Math.PI * 2);
      ctx.strokeStyle = border;
      ctx.lineWidth = 2;
      ctx.stroke();

      // hour markers
      for (let i = 0; i < 12; i++) {
        const angle = (Math.PI / 6) * i;

        const x1 = Math.cos(angle) * (r - 24);
        const y1 = Math.sin(angle) * (r - 24);

        const x2 = Math.cos(angle) * (r - 14);
        const y2 = Math.sin(angle) * (r - 14);

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = fg;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      const ms = now.getMilliseconds();

      const seconds =
        now.getSeconds() + ms / 1000;

      const minutes =
        now.getMinutes() + seconds / 60;

      const hours =
        (now.getHours() % 12) + minutes / 60;

      // hour hand
      drawHand(
        (Math.PI / 6) * hours,
        r * 0.5,
        5,
        fg
      );

      // minute hand
      drawHand(
        (Math.PI / 30) * minutes,
        r * 0.72,
        3,
        fg
      );

      // smooth second hand
      drawHand(
        (Math.PI / 30) * seconds,
        r * 0.82,
        1.5,
        "#E74C3C"
      );

      // center dot
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fillStyle = fg;
      ctx.fill();

      ctx.restore();
    }

    function drawHand(angle, length, width, color) {
      ctx.save();

      ctx.rotate(angle - Math.PI / 2);

      ctx.beginPath();
      ctx.moveTo(-10, 0);
      ctx.lineTo(length, 0);

      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = "round";
      ctx.stroke();

      ctx.restore();
    }

    // ============================================
    // HIGH PRECISION RENDER LOOP
    // ============================================

    function render() {
      const elapsed = performance.now() - basePerf;

      const preciseEpoch = baseEpoch + elapsed;

      const now = new Date(preciseEpoch);

      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");

      const hour = String(now.getHours()).padStart(2, "0");
      const minute = String(now.getMinutes()).padStart(2, "0");
      const second = String(now.getSeconds()).padStart(2, "0");
      const milli = String(now.getMilliseconds()).padStart(3, "0");

      // fractional nanoseconds approximation
      const fractional =
        preciseEpoch % 1;

      const nanos = Math.floor(
        fractional * 1_000_000
      )
        .toString()
        .padStart(6, "0");

      dateRow.textContent =
        `${year} ${month} ${day}`;

      timeRow.innerHTML =
        `${hour}:${minute}:${second}.${milli} ` +
        `<span class="subnano">${nanos}</span>`;

      drawAnalog(now);

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>

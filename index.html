<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccurateClock | A ad free, fast, and precise clock.</title>
  <style>
    :root {
      --bg: #F4F4F4; --text: #121212; --muted: #666; --border: rgba(0,0,0,0.08);
    }
    body.dark {
      --bg: #121212; --text: #F4F4F4; --muted: #999; --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      transition: background 0.3s ease;
    }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    .theme-toggle {
      position: fixed; top: 20px; right: 20px; width: 44px; height: 44px;
      border-radius: 50%; border: 1px solid var(--border);
      background: transparent; color: var(--text); cursor: pointer; z-index: 10;
    }

    .wrapper {
      display: flex; align-items: center; gap: 40px; padding: 20px; flex: 1;
    }

    .clock-block { display: flex; flex-direction: column; gap: 10px; }
    .date-row { font-size: clamp(24px, 4vw, 40px); font-weight: 300; color: var(--muted); }
    .time-row { 
      font-size: clamp(32px, 6vw, 80px); font-weight: 200; 
      font-family: monospace; font-variant-numeric: tabular-nums; 
    }
    .subnano { font-size: 0.4em; opacity: 0.6; }
    canvas { width: 220px; height: 220px; }

    /* Hidden Menu System */
    #tzMenu {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 60%;
      background: var(--bg); border-top: 1px solid var(--border);
      transform: translateY(100%); transition: transform 0.3s ease;
      z-index: 100; padding: 20px; overflow-y: auto;
    }
    #tzMenu.open { transform: translateY(0); }
    .tz-link { 
      position: fixed; bottom: 5px; right: 5px; text-decoration: none; 
      color: var(--muted); font-size: 10px; cursor: pointer; opacity: 0.3;
    }
    .tz-option { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }

    @media (max-width: 768px) {
      .wrapper { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle">☾</button>

  <main class="wrapper">
    <div class="clock-block">
      <div id="dateRow" class="date-row">---- -- --</div>
      <div id="timeRow" class="time-row">--:--:--.--- <span class="subnano">000000</span></div>
      <div id="tzDisplay" style="font-size: 12px; color: var(--muted);">Local Time</div>
    </div>
    <canvas id="analogClock" width="440" height="440" style="width:220px; height:220px;"></canvas>
  </main>

  <div id="tzMenu">
    <h3>Timezones</h3>
    <div id="tzList"></div>
    <button onclick="toggleMenu()" style="width:100%; padding: 15px; margin-top: 10px;">Close</button>
  </div>

  <a class="tz-link" onclick="toggleMenu()">LINK</a>

  <script>
    const canvas = document.getElementById("analogClock");
    const ctx = canvas.getContext("2d");
    const bc = new BroadcastChannel('clock_sync');
    let selectedTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    let wakeLock = null;

    // 1. Web Worker for precise timing logic
    const workerCode = `
      let offset = 0;
      self.onmessage = (e) => {
        if(e.data.type === 'sync') offset = e.data.offset;
      };
      setInterval(() => {
        const now = Date.now() + offset;
        self.postMessage({ type: 'tick', now });
      }, 16);
    `;
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const worker = new Worker(URL.createObjectURL(blob));

    // 2. Handle Clock Drift & Sync
    async function syncTime() {
      try {
        const t0 = performance.now();
        const r = await fetch("https://accurateclock.live-by-unix.workers.dev/", { cache: "no-store" });
        const d = await r.json();
        const rtt = performance.now() - t0;
        const serverOffset = (d.epoch + (rtt / 2)) - Date.now();
        
        worker.postMessage({ type: 'sync', offset: serverOffset });
        bc.postMessage({ type: 'offset_share', offset: serverOffset });
      } catch (e) {}
    }

    // 3. Sleep/Wake Logic
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        syncTime();
        requestWakeLock();
      }
    });

    // 4. Broadcast Channel for multi-tab sync
    bc.onmessage = (e) => {
      if (e.data.type === 'offset_share') worker.postMessage({ type: 'sync', offset: e.data.offset });
    };

    // 5. Screen Wake Lock
    async function requestWakeLock() {
      try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    }

    // 6. Timezone Menu Logic
    function toggleMenu() { document.getElementById('tzMenu').classList.toggle('open'); }
    
    const timezones = Intl.supportedValuesOf('timeZone');
    const tzList = document.getElementById('tzList');
    timezones.forEach(tz => {
      const div = document.createElement('div');
      div.className = 'tz-option';
      div.textContent = tz;
      div.onclick = () => {
        selectedTz = tz;
        document.getElementById('tzDisplay').textContent = tz;
        toggleMenu();
      };
      tzList.appendChild(div);
    });

    // 7. Rendering Logic
    worker.onmessage = (e) => {
      const now = new Date(e.data.now);
      const tzTime = new Date(now.toLocaleString("en-US", {timeZone: selectedTz}));
      
      document.getElementById('dateRow').textContent = tzTime.toLocaleDateString('sv-SE').replace(/-/g, ' ');
      
      const ms = String(tzTime.getMilliseconds()).padStart(3, '0');
      const nano = Math.floor(Math.random() * 999999).toString().padStart(6, '0'); // Simulated nano for UI
      
      document.getElementById('timeRow').innerHTML = `${tzTime.toTimeString().split(' ')[0]}.${ms} <span class="subnano">${nano}</span>`;
      
      drawAnalog(tzTime);
    };

    function drawAnalog(d) {
      ctx.clearRect(0, 0, 440, 440);
      ctx.save();
      ctx.translate(220, 220);
      const fg = getComputedStyle(document.body).getPropertyValue("--text").trim();
      
      // Face & Ticks
      ctx.strokeStyle = fg;
      for(let i=0; i<12; i++) {
        ctx.beginPath(); ctx.moveTo(0, -190); ctx.lineTo(0, -210); ctx.lineWidth=4; ctx.stroke(); ctx.rotate(Math.PI/6);
      }

      const s = d.getSeconds() + d.getMilliseconds()/1000;
      const m = d.getMinutes() + s/60;
      const h = (d.getHours() % 12) + m/60;

      const drawHand = (angle, len, width, color) => {
        ctx.save(); ctx.rotate(angle); ctx.beginPath(); ctx.moveTo(0,10); ctx.lineTo(0,-len);
        ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = "round"; ctx.stroke(); ctx.restore();
      };

      drawHand(h * Math.PI/6, 120, 10, fg);
      drawHand(m * Math.PI/30, 170, 6, fg);
      drawHand(s * Math.PI/30, 190, 3, "#E74C3C");
      ctx.restore();
    }

    // Initializations
    const toggle = document.getElementById("themeToggle");
    toggle.onclick = () => {
      document.body.classList.toggle("dark");
      toggle.textContent = document.body.classList.contains("dark") ? "☀" : "☾";
    };
    
    syncTime();
    requestWakeLock();
  </script>
</body>
</html>```
